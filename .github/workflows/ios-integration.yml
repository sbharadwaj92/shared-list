name: ios-integration

# Slice D's CI workflow for the env-gated DrainerIntegration tests
# (slice C.3 deferred this — see PR #12 + slice-D STATUS notes for the
# rationale). The unit suite still runs in `ios.yml` on every iOS-touch
# commit; this workflow runs the heavier integration suite on its own
# trigger to keep the unit lane fast.
#
# Path-filtered triggers: integration tests are valuable to run when
# either iOS or backend code changes, since a wire-protocol drift on
# either side would surface here first. Editing project docs / Android
# code shouldn't burn an macOS-runner minute (which is more expensive
# than Ubuntu).
on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'backend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/ios-integration.yml'
  pull_request:
    paths:
      - 'ios/**'
      - 'backend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/ios-integration.yml'

concurrency:
  group: ios-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: ios + backend integration
    # macOS-15 because we need to run xcodebuild + simulators. Backend
    # runs in the same job (Postgres in a docker container, Bun
    # natively) so no cross-job setup gymnastics. macOS runners ship
    # with Docker via Docker Desktop / Colima already configured for
    # GitHub-hosted runners.
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      # Backend: install Bun, install dependencies, boot Postgres,
      # apply migrations, start the backend on plain HTTP (no Caddy
      # in CI — the iOS test bundle has localhost+127.0.0.1 ATS
      # exceptions that allow insecure HTTP on those hosts only).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      # macOS GitHub runners ship Colima for the Docker daemon. We
      # start it explicitly with extra resources so Postgres has room
      # to breathe — the default Colima memory cap (2GB) is fine for
      # one Postgres but cuts close.
      - name: Start Docker (Colima)
        run: |
          # Colima is preinstalled on macos-15 runners but not started.
          colima start --cpu 2 --memory 4 --disk 10
          docker info

      - name: Boot Postgres
        working-directory: backend
        run: |
          docker compose up -d postgres
          # Block until Postgres reports ready. The compose file uses
          # the `postgres:17-alpine` image which doesn't declare a
          # HEALTHCHECK, so we poll `pg_isready` from the container
          # itself. 30s ceiling — boot is normally <5s.
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U shared_list > /dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgres://shared_list:shared_list@localhost:5432/shared_list
        run: bun run db:migrate

      # Start the backend in the background. The `&` + write-pid trick
      # gives us a way to log+kill it later if we need to. The
      # `nohup ... > backend.log 2>&1` redirect captures startup
      # noise without blocking the workflow step. We use port 3000
      # explicitly (matches `backend/.env.example`) and skip Caddy —
      # see project.yml ATS notes for why iOS can hit plain HTTP on
      # localhost in CI.
      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://shared_list:shared_list@localhost:5432/shared_list
          NODE_ENV: development
          LOG_LEVEL: info
          # JWT_SECRET must be ≥32 chars per the Zod-validated config
          # at boot. The value is irrelevant — only its length matters.
          JWT_SECRET: ci-integration-jwt-secret-at-least-32-chars-long
          PORT: "3000"
        run: |
          nohup bun run dev > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          # Wait for the /health endpoint to respond before continuing.
          # Bun startup is fast (~100ms) but compilation of the TS
          # entry on first run can take a couple seconds.
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/health || (echo "Backend never came up" && cat /tmp/backend.log && exit 1)

      # iOS toolchain setup. Same pattern as `ios.yml` — pick the
      # latest Xcode 26.x available on the runner image.
      - name: Select Xcode
        run: |
          ls /Applications | grep -E '^Xcode_26' | sort -V | tail -1 | xargs -I {} sudo xcode-select -s "/Applications/{}/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Boot iPhone simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            jq -r '[.devices[] | .[] | select(.name | test("iPhone.*Pro Max"))] | .[0].udid')
          if [ -z "$DEVICE_ID" ] || [ "$DEVICE_ID" = "null" ]; then
            DEVICE_ID=$(xcrun simctl list devices available -j | \
              jq -r '[.devices[] | .[] | select(.name | startswith("iPhone"))] | .[0].udid')
          fi
          echo "Using simulator $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV

      # The integration tests skip silently when BACKEND_URL is unset;
      # we set it explicitly here to point at the locally-running
      # backend over plain HTTP. `-only-testing:` scopes to the
      # DrainerIntegration suite — the unit suite ran in `ios.yml`,
      # no value in re-running it here.
      - name: Run DrainerIntegration tests
        working-directory: ios
        env:
          BACKEND_URL: "http://localhost:3000"
        run: |
          xcodebuild \
            -project SharedList.xcodeproj \
            -scheme SharedList \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -only-testing:SharedListTests/DrainerIntegration \
            test \
            | xcbeautify

      # Surface the backend log on failure — it's the most useful
      # forensic artifact when an integration test fails. The
      # `if: failure()` makes this only fire when something earlier
      # tripped, so passing runs stay quiet.
      - name: Backend log (on failure)
        if: failure()
        run: |
          echo "=== backend log ==="
          cat /tmp/backend.log || true
          echo "=== Postgres status ==="
          docker compose -f backend/docker-compose.yml ps || true
